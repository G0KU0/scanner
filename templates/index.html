<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotmail Inboxer Web</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: #0a0a0f;
            font-family: 'Segoe UI', sans-serif;
        }
        .glow-green { text-shadow: 0 0 20px #22c55e; }
        .glow-box {
            box-shadow: 0 0 30px rgba(34,197,94,0.1);
        }
        .card {
            background: linear-gradient(
                145deg, #111118 0%, #0d0d14 100%
            );
            border: 1px solid #1a1a2e;
        }
        #logBox {
            scrollbar-width: thin;
            scrollbar-color: #22c55e #111;
        }
        #logBox::-webkit-scrollbar { width: 6px; }
        #logBox::-webkit-scrollbar-track { background: #111; }
        #logBox::-webkit-scrollbar-thumb {
            background: #22c55e;
            border-radius: 3px;
        }
        .progress-bar {
            background: linear-gradient(
                90deg, #22c55e, #06b6d4, #22c55e
            );
            background-size: 200% 100%;
            animation: shimmer 2s infinite;
        }
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        @keyframes fadeIn {
            from { opacity:0; transform:translateY(10px); }
            to { opacity:1; transform:translateY(0); }
        }
        .fade-in { animation: fadeIn 0.3s ease-out; }
        .stat-card {
            transition: all 0.3s ease;
        }
        .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body class="min-h-screen text-white">

<!-- HEADER -->
<div class="text-center pt-10 pb-6">
    <h1 class="text-5xl font-black glow-green text-green-400 mb-2">
        ⚡ HOTMAIL INBOXER
    </h1>
    <p class="text-gray-500 text-lg">
        Web Edition • Keyword Search • Live Results
    </p>
</div>

<div class="max-w-6xl mx-auto px-4 pb-10">

    <!-- FORM -->
    <div class="card rounded-2xl p-8 mb-8 glow-box fade-in">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 items-end">
            <div class="md:col-span-1">
                <label class="block text-sm text-gray-400 mb-2 uppercase tracking-wider">
                    📁 Combo fájl
                </label>
                <input type="file" id="comboFile" accept=".txt"
                    class="w-full px-4 py-3 bg-gray-900 border border-gray-700
                    rounded-xl text-gray-300 file:mr-4 file:py-2 file:px-4
                    file:rounded-lg file:border-0 file:bg-green-600
                    file:text-white file:cursor-pointer
                    hover:border-green-500 transition">
            </div>
            <div class="md:col-span-1">
                <label class="block text-sm text-gray-400 mb-2 uppercase tracking-wider">
                    🔍 Keyword
                </label>
                <input type="text" id="keyword"
                    placeholder="netflix, spotify, playstation..."
                    class="w-full px-4 py-3 bg-gray-900 border border-gray-700
                    rounded-xl text-white placeholder-gray-600
                    focus:border-green-500 focus:outline-none transition">
            </div>
            <div class="md:col-span-1">
                <button onclick="startChecker()" id="startBtn"
                    class="w-full py-3 bg-green-600 hover:bg-green-500
                    text-white text-lg font-bold rounded-xl transition
                    transform hover:scale-[1.02] active:scale-95
                    disabled:opacity-50 disabled:cursor-not-allowed">
                    🚀 START
                </button>
            </div>
        </div>

        <!-- PROGRESS -->
        <div id="progressWrap" class="mt-6 hidden">
            <div class="flex justify-between text-sm text-gray-400 mb-1">
                <span>Haladás</span>
                <span id="progressText">0 / 0</span>
            </div>
            <div class="w-full bg-gray-800 rounded-full h-3 overflow-hidden">
                <div id="progressBar"
                    class="progress-bar h-full rounded-full transition-all
                    duration-500" style="width: 0%">
                </div>
            </div>
        </div>
    </div>

    <!-- STATS -->
    <div id="statsWrap"
         class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8 hidden">
        <div class="stat-card card rounded-xl p-5 text-center">
            <div class="text-4xl font-black text-green-400"
                 id="statHits">0</div>
            <div class="text-sm text-gray-400 mt-1">✅ HITS</div>
        </div>
        <div class="stat-card card rounded-xl p-5 text-center">
            <div class="text-4xl font-black text-cyan-400"
                 id="statCustom">0</div>
            <div class="text-sm text-gray-400 mt-1">📋 CUSTOM</div>
        </div>
        <div class="stat-card card rounded-xl p-5 text-center">
            <div class="text-4xl font-black text-red-400"
                 id="statBad">0</div>
            <div class="text-sm text-gray-400 mt-1">❌ BAD</div>
        </div>
        <div class="stat-card card rounded-xl p-5 text-center">
            <div class="text-4xl font-black text-yellow-400"
                 id="statRetry">0</div>
            <div class="text-sm text-gray-400 mt-1">🔄 RETRIES</div>
        </div>
    </div>

    <!-- DOWNLOAD GOMBOK -->
    <div id="downloadWrap"
         class="flex gap-4 mb-8 hidden">
        <a href="/download/hits" id="dlHits"
            class="flex-1 py-3 bg-green-600/20 border border-green-600
            text-green-400 text-center rounded-xl hover:bg-green-600/30
            transition font-bold">
            ⬇️ Hits letöltése
        </a>
        <a href="/download/custom" id="dlCustom"
            class="flex-1 py-3 bg-cyan-600/20 border border-cyan-600
            text-cyan-400 text-center rounded-xl hover:bg-cyan-600/30
            transition font-bold">
            ⬇️ Custom letöltése
        </a>
    </div>

    <!-- LOG -->
    <div class="card rounded-2xl overflow-hidden glow-box">
        <div class="flex items-center justify-between px-6 py-3
                    border-b border-gray-800">
            <span class="text-sm text-gray-400">📜 Live Log</span>
            <span id="logCount" class="text-xs text-gray-600">
                0 sor
            </span>
        </div>
        <div id="logBox"
             class="h-[500px] overflow-y-auto p-4 font-mono text-sm
             space-y-1">
            <div class="text-gray-600 text-center py-20">
                Indítsd el a checkert a logok megjelenítéséhez...
            </div>
        </div>
    </div>

</div>

<script>
let ws = null;
let logCount = 0;
let started = false;

function connectWS() {
    const protocol = location.protocol === 'https:'
        ? 'wss:' : 'ws:';
    ws = new WebSocket(protocol + '//' + location.host + '/ws');

    ws.onopen = () => console.log('WS connected');

    ws.onmessage = (e) => {
        if (e.data === 'pong') return;
        try {
            const data = JSON.parse(e.data);
            handleMessage(data);
        } catch(err) {
            console.error('WS parse error', err);
        }
    };

    ws.onclose = () => {
        console.log('WS disconnected, reconnecting...');
        setTimeout(connectWS, 2000);
    };

    // Heartbeat
    setInterval(() => {
        if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send('ping');
        }
    }, 30000);
}

function handleMessage(data) {
    if (data.type === 'stats') {
        document.getElementById('statHits').textContent = data.hits;
        document.getElementById('statCustom').textContent = data.custom;
        document.getElementById('statBad').textContent = data.bad;
        document.getElementById('statRetry').textContent = data.retries;

        if (data.total > 0) {
            const pct = Math.round(
                (data.checked / data.total) * 100
            );
            document.getElementById('progressBar')
                .style.width = pct + '%';
            document.getElementById('progressText')
                .textContent = data.checked + ' / ' + data.total;
        }
    }
    else if (data.type === 'log') {
        addLog(data.text, data.level);
    }
    else if (data.type === 'finished') {
        document.getElementById('startBtn').disabled = false;
        document.getElementById('startBtn').textContent = '🚀 START';
        document.getElementById('downloadWrap')
            .classList.remove('hidden');
        addLog('════════ KÉSZ ════════', 'finish');
    }
}

function addLog(text, level) {
    const box = document.getElementById('logBox');
    if (!started) {
        box.innerHTML = '';
        started = true;
    }

    const div = document.createElement('div');
    div.className = 'fade-in py-0.5';

    const colors = {
        'hit':    'text-green-400',
        'custom': 'text-cyan-400',
        'bad':    'text-red-400/60',
        'info':   'text-yellow-400',
        'finish': 'text-yellow-300 text-lg font-bold text-center'
    };

    div.className += ' ' + (colors[level] || 'text-gray-400');
    div.textContent = text;
    box.appendChild(div);

    logCount++;
    document.getElementById('logCount').textContent =
        logCount + ' sor';

    // Auto-scroll
    box.scrollTop = box.scrollHeight;

    // Max 2000 sor (memória védelem)
    while (box.children.length > 2000) {
        box.removeChild(box.firstChild);
    }
}

async function startChecker() {
    const fileInput = document.getElementById('comboFile');
    const keyword = document.getElementById('keyword').value.trim();

    if (!fileInput.files.length) {
        alert('Válassz egy combo fájlt!');
        return;
    }
    if (!keyword) {
        alert('Írd be a keywordöt!');
        return;
    }

    const formData = new FormData();
    formData.append('file', fileInput.files[0]);
    formData.append('keyword', keyword);

    document.getElementById('startBtn').disabled = true;
    document.getElementById('startBtn').textContent = '⏳ Fut...';
    document.getElementById('statsWrap')
        .classList.remove('hidden');
    document.getElementById('progressWrap')
        .classList.remove('hidden');
    document.getElementById('downloadWrap')
        .classList.add('hidden');

    // Reset
    logCount = 0;
    started = false;
    document.getElementById('statHits').textContent = '0';
    document.getElementById('statCustom').textContent = '0';
    document.getElementById('statBad').textContent = '0';
    document.getElementById('statRetry').textContent = '0';
    document.getElementById('progressBar').style.width = '0%';

    try {
        const res = await fetch('/start', {
            method: 'POST',
            body: formData
        });
        const json = await res.json();
        if (json.error) {
            alert(json.error);
            document.getElementById('startBtn').disabled = false;
            document.getElementById('startBtn')
                .textContent = '🚀 START';
        }
    } catch(err) {
        alert('Hiba: ' + err);
        document.getElementById('startBtn').disabled = false;
        document.getElementById('startBtn')
            .textContent = '🚀 START';
    }
}

// Induláskor WS csatlakozás
connectWS();
</script>
</body>
</html>
