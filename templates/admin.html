<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Hotmail Inboxer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="dashboard-bg min-h-screen p-4 md:p-8">
    
    <div class="max-w-4xl mx-auto relative z-10">
        <div class="flex items-center justify-between mb-8">
            <h1 class="text-3xl font-black text-white flex items-center gap-3">
                <i data-lucide="shield-check" class="text-indigo-400"></i>
                Admin Panel
            </h1>
            <a href="/dashboard" class="px-4 py-2 bg-white/5 hover:bg-white/10 text-white rounded-xl transition text-sm">Vissza</a>
        </div>

        <div class="glass-card p-6 md:p-8 rounded-3xl animate-fade-in">
            <div class="flex flex-col sm:flex-row justify-between items-center gap-4 mb-6">
                <h2 class="text-xl font-bold text-white flex items-center gap-2">
                    <i data-lucide="key" class="w-5 h-5 text-purple-400"></i>
                    Meghívó Kódok
                </h2>
                <button onclick="generateInvite()" class="glass-button !w-auto !px-6 !py-2.5 !text-sm flex items-center gap-2">
                    <i data-lucide="plus-circle" class="w-4 h-4"></i> Új Kód
                </button>
            </div>

            <div class="overflow-x-auto rounded-xl">
                <table class="w-full text-left border-collapse bg-black/20">
                    <thead>
                        <tr class="border-b border-white/10 text-white/50 text-xs uppercase tracking-wider">
                            <th class="p-4">Kód</th>
                            <th class="p-4">Felhasználó</th>
                            <th class="p-4 text-right">Művelet</th>
                        </tr>
                    </thead>
                    <tbody id="invitesTable" class="text-sm text-white/80">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();
        const token = localStorage.getItem('token');
        const email = localStorage.getItem('email');

        if (!token || email !== 'xat.king6969@gmail.com') {
            window.location.href = '/dashboard';
        }

        async function loadInvites() {
            const res = await fetch('/api/admin/invites', { headers: { 'Authorization': `Bearer ${token}` } });
            const data = await res.json();
            const tbody = document.getElementById('invitesTable');
            
            tbody.innerHTML = data.map(inv => `
                <tr class="border-b border-white/5 hover:bg-white/5 transition">
                    <td class="p-4 font-mono text-indigo-300 font-bold">${inv.code}</td>
                    <td class="p-4">
                        ${inv.is_used ? `<span class="text-red-400">Használja: ${inv.used_by}</span>` : '<span class="text-green-400 font-semibold">Szabad</span>'}
                    </td>
                    <td class="p-4 text-right">
                        <button onclick="deleteInvite('${inv.code}')" class="px-3 py-1.5 bg-red-500/10 text-red-400 rounded-lg hover:bg-red-500/20 transition text-xs">
                            Zárolás / Törlés
                        </button>
                    </td>
                </tr>
            `).join('');
            lucide.createIcons();
        }

        async function generateInvite() {
            const res = await fetch('/api/admin/generate_invite', { method: 'POST', headers: { 'Authorization': `Bearer ${token}` } });
            if (res.ok) { loadInvites(); }
        }

        async function deleteInvite(code) {
            if(!confirm('VIGYÁZAT: A kód törlése azonnal ZÁROLJA az azt használó felhasználót! Folytatod?')) return;
            const res = await fetch(`/api/admin/invites/${code}`, { method: 'DELETE', headers: { 'Authorization': `Bearer ${token}` } });
            if (res.ok) { loadInvites(); }
        }

        loadInvites();
    </script>
</body>
</html>
