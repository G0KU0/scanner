<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dashboard - Hotmail Inboxer by Szaby</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
</head>
<body class="dashboard-bg">
    
    <header class="sticky top-0 z-50 backdrop-blur-xl bg-black/40 border-b border-white/5">
        <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 md:w-10 md:h-10 rounded-xl flex items-center justify-center"
                     style="background: linear-gradient(135deg, #6366f1, #8b5cf6);">
                    <i data-lucide="zap" class="w-4 h-4 md:w-5 md:h-5 text-white"></i>
                </div>
                <div>
                    <h1 class="text-base md:text-lg font-black text-white tracking-tight">Hotmail Inboxer</h1>
                    <p class="text-[9px] md:text-[10px] text-white/30 uppercase tracking-[3px]">by Szaby</p>
                </div>
            </div>
            <div class="flex items-center gap-2 md:gap-4">
                
                <a href="/admin" id="adminBtn" class="hidden items-center gap-2 px-3 md:px-4 py-2 bg-indigo-500/10 hover:bg-indigo-500/20 border border-indigo-500/30 text-indigo-300 rounded-xl transition text-xs md:text-sm font-semibold shadow-[0_0_15px_rgba(99,102,241,0.2)]">
                    <i data-lucide="shield-alert" class="w-4 h-4"></i>
                    <span class="hidden sm:inline">Admin</span>
                </a>

                <div class="hidden sm:flex items-center gap-2 px-4 py-2 rounded-xl bg-white/5 border border-white/5">
                    <i data-lucide="user" class="w-3.5 h-3.5 text-indigo-400"></i>
                    <span id="userEmail" class="text-sm text-white/70 font-medium truncate max-w-[150px]">Loading...</span>
                </div>
                <button onclick="logout()" 
                    class="flex items-center gap-2 px-3 md:px-4 py-2 bg-white/5 hover:bg-red-500/10 border border-white/5 hover:border-red-500/20
                    text-white/60 hover:text-red-300 rounded-xl transition text-xs md:text-sm font-semibold">
                    <i data-lucide="log-out" class="w-4 h-4"></i>
                    <span class="hidden sm:inline">Kilépés</span>
                </button>
            </div>
        </div>
    </header>

    <div class="max-w-7xl mx-auto px-3 md:px-4 py-6 md:py-8 space-y-6 md:space-y-8">

        <div class="glass-card animate-fade-in">
            <h2 class="text-lg md:text-xl font-black text-white mb-4 md:mb-6 flex items-center gap-3">
                <div class="w-7 h-7 md:w-8 md:h-8 rounded-lg flex items-center justify-center" 
                     style="background: linear-gradient(135deg, #6366f1, #8b5cf6);">
                    <i data-lucide="rocket" class="w-3.5 h-3.5 md:w-4 md:h-4 text-white"></i>
                </div>
                <span>Új Checker Indítása</span>
            </h2>
            
            <form id="checkerForm" class="space-y-4 md:space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4 md:gap-6">
                    <div>
                        <label class="block text-white/50 text-xs mb-1.5 font-semibold uppercase tracking-wider flex items-center gap-2">
                            <i data-lucide="file-text" class="w-3.5 h-3.5"></i> Combo fájl
                        </label>
                        <input type="file" id="comboFile" accept=".txt" required class="file-input">
                    </div>
                    
                    <div>
                        <label class="block text-white/50 text-xs mb-1.5 font-semibold uppercase tracking-wider flex items-center gap-2">
                            <i data-lucide="search" class="w-3.5 h-3.5"></i> Keyword
                        </label>
                        <input type="text" id="keyword" required placeholder="netflix, spotify..." class="glass-input">
                    </div>
                    
                    <div>
                        <label class="block text-white/50 text-xs mb-1.5 font-semibold uppercase tracking-wider flex items-center gap-2">
                            <i data-lucide="gauge" class="w-3.5 h-3.5"></i> Sebesség
                        </label>
                        <select id="speed" class="glass-input cursor-pointer">
                            <option value="0.05">Ultra gyors (0.05s)</option>
                            <option value="0.1">Nagyon gyors (0.1s)</option>
                            <option value="0.15">Gyors (0.15s)</option>
                            <option value="0.2">Közepes (0.2s)</option>
                            <option value="0.3" selected>Ajánlott (0.3s)</option>
                            <option value="0.5">Biztonságos (0.5s)</option>
                            <option value="1.0">Lassú (1.0s)</option>
                        </select>
                        <p class="text-[10px] md:text-[11px] text-white/25 mt-1.5 flex items-center gap-1" id="speedInfo">
                            <i data-lucide="activity" class="w-3 h-3"></i> ~180 account/perc
                        </p>
                    </div>
                </div>

                <div class="flex flex-col md:flex-row gap-3 md:gap-4 pt-2">
                    <button type="submit" id="startBtn" class="glass-button w-full md:flex-1 py-4 md:py-3 text-sm md:text-base">
                        <i data-lucide="play" class="w-4 h-4 md:w-5 md:h-5"></i>
                        <span>START CHECKER</span>
                    </button>
                    <button type="button" id="stopBtn" onclick="stopChecker()" 
                        class="hidden w-full md:w-auto flex items-center justify-center gap-2 px-8 py-4 md:py-3 bg-red-500/10 hover:bg-red-500/20 border border-red-500/30 text-red-300 rounded-xl font-bold transition text-sm md:text-base"
                        style="font-family: 'Inter', sans-serif;">
                        <i data-lucide="square" class="w-4 h-4"></i> STOP
                    </button>
                </div>
            </form>

            <div id="progressWrap" class="mt-4 md:mt-6 hidden">
                <div class="flex justify-between text-[10px] md:text-xs text-white/40 mb-1.5 font-medium">
                    <span class="flex items-center gap-1"><i data-lucide="loader" class="w-3 h-3 animate-spin"></i> Haladás</span>
                    <span id="progressText">0 / 0</span>
                </div>
                <div class="w-full bg-white/5 rounded-full h-2 md:h-3 overflow-hidden">
                    <div id="progressBar" class="progress-bar h-full rounded-full transition-all duration-500" style="width: 0%"></div>
                </div>
            </div>
        </div>

        <div id="statsWrap" class="grid grid-cols-2 md:grid-cols-4 gap-3 md:gap-4 hidden">
            <div class="stat-card stat-hit cursor-pointer" onclick="togglePreview('hits')">
                <div class="flex justify-center mb-1 md:mb-2"><i data-lucide="check-circle" class="w-5 h-5 md:w-6 md:h-6 text-green-400/50"></i></div>
                <div class="stat-value" id="statHits">0</div>
                <div class="stat-label">HITS</div>
                <div class="text-[9px] md:text-[10px] text-white/20 mt-1.5 md:mt-2 flex items-center justify-center gap-1"><i data-lucide="eye" class="w-2.5 h-2.5 md:w-3 md:h-3"></i> Megtekintés</div>
            </div>
            <div class="stat-card stat-custom cursor-pointer" onclick="togglePreview('custom')">
                <div class="flex justify-center mb-1 md:mb-2"><i data-lucide="clipboard-list" class="w-5 h-5 md:w-6 md:h-6 text-cyan-400/50"></i></div>
                <div class="stat-value" id="statCustom">0</div>
                <div class="stat-label">CUSTOM</div>
                <div class="text-[9px] md:text-[10px] text-white/20 mt-1.5 md:mt-2 flex items-center justify-center gap-1"><i data-lucide="eye" class="w-2.5 h-2.5 md:w-3 md:h-3"></i> Megtekintés</div>
            </div>
            <div class="stat-card stat-bad">
                <div class="flex justify-center mb-1 md:mb-2"><i data-lucide="x-circle" class="w-5 h-5 md:w-6 md:h-6 text-red-400/50"></i></div>
                <div class="stat-value" id="statBad">0</div>
                <div class="stat-label">BAD</div>
            </div>
            <div class="stat-card stat-retry">
                <div class="flex justify-center mb-1 md:mb-2"><i data-lucide="refresh-cw" class="w-5 h-5 md:w-6 md:h-6 text-yellow-400/50"></i></div>
                <div class="stat-value" id="statRetry">0</div>
                <div class="stat-label">RETRIES</div>
            </div>
        </div>

        <div id="livePreview" class="glass-card overflow-hidden hidden">
            <div class="flex items-center justify-between px-4 py-3 md:px-6 md:py-4 border-b border-white/5 bg-black/20">
                <div class="flex items-center gap-2 md:gap-3">
                    <div class="w-1.5 h-1.5 md:w-2 md:h-2 rounded-full bg-green-400 animate-pulse"></div>
                    <i data-lucide="eye" class="w-3.5 h-3.5 md:w-4 md:h-4 text-white/50"></i>
                    <span class="text-white font-bold text-xs md:text-sm" id="previewTitle">Live Hits</span>
                    <span class="text-[10px] md:text-xs text-white/30 font-mono" id="previewCount">(0)</span>
                </div>
                <button onclick="togglePreview(null)" class="w-6 h-6 md:w-8 md:h-8 flex items-center justify-center rounded-lg bg-white/5 hover:bg-white/10 text-white/40 transition"><i data-lucide="x" class="w-3.5 h-3.5 md:w-4 md:h-4"></i></button>
            </div>
            <div id="previewBox" class="h-[300px] md:h-[400px] overflow-y-auto p-3 md:p-4 space-y-2 bg-black/30" style="font-family: 'JetBrains Mono', monospace; font-size: 11px;"></div>
        </div>

        <div id="downloadWrap" class="flex flex-col sm:flex-row gap-3 md:gap-4 hidden">
            <button onclick="downloadResults('hits')" class="w-full sm:flex-1 download-btn download-hit py-3 md:py-4">
                <i data-lucide="download" class="w-4 h-4 md:w-5 md:h-5"></i>
                <span class="text-sm md:text-base">Hits letöltése</span>
                <span id="hitsCount" class="opacity-50 font-mono text-xs md:text-sm">(0)</span>
            </button>
            <button onclick="downloadResults('custom')" class="w-full sm:flex-1 download-btn download-custom py-3 md:py-4">
                <i data-lucide="download" class="w-4 h-4 md:w-5 md:h-5"></i>
                <span class="text-sm md:text-base">Custom letöltése</span>
                <span id="customCount" class="opacity-50 font-mono text-xs md:text-sm">(0)</span>
            </button>
        </div>

        <div class="glass-card overflow-hidden">
            <div class="flex items-center justify-between px-4 py-3 md:px-6 md:py-4 border-b border-white/5 bg-black/20">
                <div class="flex items-center gap-2 md:gap-3">
                    <i data-lucide="terminal" class="w-3.5 h-3.5 md:w-4 md:h-4 text-indigo-400"></i>
                    <span class="text-white font-bold text-xs md:text-sm">Live Log</span>
                </div>
                <div class="flex items-center gap-2 md:gap-3">
                    <span id="logCount" class="text-[9px] md:text-[11px] text-white/25 font-mono">0 sor</span>
                    <button onclick="clearLog()" class="flex items-center gap-1 text-[10px] md:text-[11px] px-2.5 py-1.5 bg-white/5 hover:bg-white/10 text-white/40 rounded-lg transition font-medium"><i data-lucide="trash-2" class="w-3 h-3"></i> Törlés</button>
                </div>
            </div>
            <div id="logBox" class="h-[350px] md:h-[500px] overflow-y-auto p-3 md:p-4 space-y-1 bg-black/30">
                <div class="text-white/15 text-center py-10 md:py-20 text-xs md:text-sm flex flex-col items-center gap-3 md:gap-4">
                    <i data-lucide="terminal" class="w-8 h-8 md:w-10 md:h-10 opacity-20"></i>
                    <p>Indítsd el a checkert...</p>
                </div>
            </div>
        </div>

        <div class="glass-card">
            <div class="flex items-center justify-between mb-4 md:mb-6">
                <h2 class="text-lg md:text-xl font-black text-white flex items-center gap-2 md:gap-3">
                    <div class="w-7 h-7 md:w-8 md:h-8 rounded-lg flex items-center justify-center bg-white/5">
                        <i data-lucide="archive" class="w-3.5 h-3.5 md:w-4 md:h-4 text-indigo-400"></i>
                    </div>
                    <span>Legutóbbi Eredmény</span>
                </h2>
                <button onclick="loadHistory()" class="flex items-center gap-1 md:gap-2 px-3 py-1.5 md:px-4 md:py-2 bg-white/5 hover:bg-white/10 text-white/50 rounded-lg transition text-[10px] md:text-xs font-semibold uppercase tracking-wider"><i data-lucide="refresh-cw" class="w-3 h-3 md:w-3.5 h-3.5"></i> Frissítés</button>
            </div>
            <div id="historyList" class="space-y-3"></div>
        </div>

        <div class="footer mt-8 md:mt-12 mb-2 md:mb-4">
            <div class="footer-divider"></div>
            <div class="flex items-center justify-center gap-2 md:gap-3 mt-3">
                <i data-lucide="code-2" class="w-3.5 h-3.5 md:w-4 md:h-4 text-indigo-400/50"></i>
                <span class="footer-brand text-sm md:text-base">SZABY</span>
                <span class="text-white/10">·</span>
                <span class="text-white/20 text-xs md:text-sm">Hotmail Inboxer v4.0 VIP</span>
            </div>
            <p class="text-white/10 text-[9px] md:text-[11px] mt-2">Minden jog fenntartva © 2025</p>
        </div>

    </div>

    <script>
        lucide.createIcons();
        let ws = null; let logCount = 0; let started = false; let currentRunId = null;
        const token = localStorage.getItem('token'); const email = localStorage.getItem('email');
        let liveHits = []; let liveCustom = []; let currentPreview = null;

        if (!token || !email) { window.location.href = '/'; }
        document.getElementById('userEmail').textContent = email;

        // --- ÚJ: ADMIN GOMB LÁTHATÓSÁGA ---
        if (email === 'xat.king6969@gmail.com') {
            const adminBtn = document.getElementById('adminBtn');
            if(adminBtn) {
                adminBtn.classList.remove('hidden');
                adminBtn.classList.add('flex');
            }
        }

        document.getElementById('speed').addEventListener('change', function() {
            const s = parseFloat(this.value);
            document.getElementById('speedInfo').innerHTML = `<i data-lucide="activity" class="w-3 h-3"></i> ~${Math.round(60/s)} account/perc (~${Math.round(3600/s).toLocaleString()}/óra)`;
            lucide.createIcons();
        });
        document.getElementById('speed').dispatchEvent(new Event('change'));

        function connectWS() {
            const p = location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(`${p}//${location.host}/ws?token=${token}`);
            ws.onopen = () => console.log('✅ WS connected');
            ws.onmessage = (e) => { 
                if (e.data === 'pong') return; 
                try { handleMessage(JSON.parse(e.data)); } catch(err) {} 
            };
            ws.onclose = () => setTimeout(connectWS, 2000);
            setInterval(() => { if (ws && ws.readyState === WebSocket.OPEN) ws.send('ping'); }, 30000);
        }

        function handleMessage(data) {
            if (data.type === 'stats' || data.type === 'log' || data.type === 'active_run') {
                if (!data.text || (!data.text.includes('KÉSZ') && !data.text.includes('LEÁLLÍTVA') && !data.text.includes('Eredmények'))) {
                    document.getElementById('statsWrap').classList.remove('hidden');
                    document.getElementById('progressWrap').classList.remove('hidden');
                    document.getElementById('stopBtn').classList.remove('hidden');
                    document.getElementById('downloadWrap').classList.add('hidden');
                    const btn = document.getElementById('startBtn');
                    if (!btn.disabled) { btn.disabled = true; btn.innerHTML = '<i data-lucide="loader" class="w-4 h-4 md:w-5 md:h-5 animate-spin"></i><span>Fut...</span>'; lucide.createIcons(); }
                }
            }

            if (data.type === 'stats') {
                document.getElementById('statHits').textContent = data.hits;
                document.getElementById('statCustom').textContent = data.custom;
                document.getElementById('statBad').textContent = data.bad;
                document.getElementById('statRetry').textContent = data.retries;
                if (data.total > 0) {
                    const pct = Math.round((data.checked / data.total) * 100);
                    document.getElementById('progressBar').style.width = pct + '%';
                    document.getElementById('progressText').textContent = `${data.checked} / ${data.total} (${pct}%)`;
                }
                currentRunId = data.run_id;
            }
            else if (data.type === 'log') { addLog(data.text, data.level); }
            else if (data.type === 'live_hit') { liveHits.push(data.data); if (currentPreview === 'hits') updatePreview('hits'); }
            else if (data.type === 'live_custom') { liveCustom.push(data.data); if (currentPreview === 'custom') updatePreview('custom'); }
            else if (data.type === 'finished' || data.type === 'stopped') {
                document.getElementById('startBtn').disabled = false;
                document.getElementById('startBtn').innerHTML = '<i data-lucide="play" class="w-4 h-4 md:w-5 md:h-5"></i><span>START CHECKER</span>';
                document.getElementById('stopBtn').classList.add('hidden');
                document.getElementById('downloadWrap').classList.remove('hidden');
                document.getElementById('hitsCount').textContent = `(${document.getElementById('statHits').textContent})`;
                document.getElementById('customCount').textContent = `(${document.getElementById('statCustom').textContent})`;
                loadHistory(); lucide.createIcons();
            }
            else if (data.type === 'active_run') {
                const run = data.run; currentRunId = run._id;
                document.getElementById('statHits').textContent = run.hits;
                document.getElementById('statCustom').textContent = run.custom;
                document.getElementById('statBad').textContent = run.bad;
                document.getElementById('statRetry').textContent = run.retries;
                const pct = Math.round((run.checked / run.total) * 100);
                document.getElementById('progressBar').style.width = pct + '%';
                document.getElementById('progressText').textContent = `${run.checked} / ${run.total} (${pct}%)`;
            }
        }

        function addLog(text, level) {
            const box = document.getElementById('logBox');
            if (!started) { box.innerHTML = ''; started = true; }
            const div = document.createElement('div');
            div.className = 'log-line animate-fade-in ' + ({'hit':'log-hit','custom':'log-custom','bad':'log-bad','info':'log-info','finish':'log-finish'}[level] || 'log-default');
            div.innerHTML = `<span class="log-time">[${new Date().toLocaleTimeString('hu-HU')}]</span> ${text}`;
            box.appendChild(div); logCount++; document.getElementById('logCount').textContent = logCount + ' sor';
            box.scrollTop = box.scrollHeight; while (box.children.length > 2000) box.removeChild(box.firstChild);
        }

        function clearLog() {
            document.getElementById('logBox').innerHTML = '<div class="text-white/15 text-center py-10 md:py-20 text-xs md:text-sm flex flex-col items-center gap-3 md:gap-4"><i data-lucide="terminal" class="w-8 h-8 md:w-10 md:h-10 opacity-20"></i><p>Log törölve</p></div>';
            logCount = 0; started = false; document.getElementById('logCount').textContent = '0 sor'; lucide.createIcons();
        }

        function togglePreview(type) {
            const preview = document.getElementById('livePreview');
            if (type === null || currentPreview === type) { preview.classList.add('hidden'); currentPreview = null; return; }
            currentPreview = type; preview.classList.remove('hidden'); updatePreview(type);
        }

        function updatePreview(type) {
            const box = document.getElementById('previewBox');
            const data = type === 'hits' ? liveHits : liveCustom;
            document.getElementById('previewTitle').textContent = type === 'hits' ? 'Live Hits' : 'Live Custom';
            document.getElementById('previewCount').textContent = `(${data.length})`;
            if (data.length === 0) { box.innerHTML = '<div class="text-white/20 text-center py-10 md:py-20 flex flex-col items-center gap-2 md:gap-3"><i data-lucide="inbox" class="w-6 h-6 md:w-8 md:h-8"></i>Még nincs találat...</div>'; lucide.createIcons(); return; }
            const color = type === 'hits' ? 'green' : 'cyan';
            
            box.innerHTML = data.map((item, i) => {
                let dateHtml = '';
                if (type === 'hits' && item.date && item.date !== 'N/A') {
                    dateHtml = `<span>·</span><span class="text-yellow-400/90 font-medium">Utolsó levél: ${item.date}</span>`;
                }

                return `
                <div class="p-2.5 md:p-3 bg-${color}-500/5 border border-${color}-500/20 rounded-lg animate-fade-in">
                    <div class="text-${color}-400 font-bold mb-1 flex items-center gap-1.5 md:gap-2 text-[11px] md:text-xs">
                        <span class="text-white/30 text-[9px] md:text-[10px]">#${i+1}</span>
                        <span class="break-all">${item.email}:${item.password}</span>
                    </div>
                    <div class="text-[9px] md:text-[11px] text-white/40 flex items-center gap-2 md:gap-3 flex-wrap">
                        <span>${item.country || 'N/A'}</span>
                        <span>·</span>
                        <span>${item.name || 'N/A'}</span>
                        <span>·</span>
                        <span>${item.birthdate || 'N/A'}</span>
                        ${item.mails ? `<span>·</span><span class="text-${color}-400">${item.mails} emails</span>` : ''}
                        ${dateHtml}
                    </div>
                </div>`;
            }).reverse().join('');
            box.scrollTop = 0;
        }

        async function startChecker(e) {
            e.preventDefault();
            const fileInput = document.getElementById('comboFile');
            const keyword = document.getElementById('keyword').value.trim();
            const speed = document.getElementById('speed').value;
            if (!fileInput.files.length) return alert('Válassz combo fájlt!');
            if (!keyword) return alert('Írd be a keywordöt!');
            const formData = new FormData(); formData.append('file', fileInput.files[0]); formData.append('keyword', keyword); formData.append('speed', speed);
            const btn = document.getElementById('startBtn'); btn.disabled = true; btn.innerHTML = '<i data-lucide="loader" class="w-4 h-4 md:w-5 md:h-5 animate-spin"></i><span>Indítás...</span>'; lucide.createIcons();
            document.getElementById('statsWrap').classList.remove('hidden'); document.getElementById('progressWrap').classList.remove('hidden'); document.getElementById('downloadWrap').classList.add('hidden'); document.getElementById('stopBtn').classList.remove('hidden');
            logCount = 0; started = false; liveHits = []; liveCustom = []; currentPreview = null; document.getElementById('livePreview').classList.add('hidden');
            ['statHits','statCustom','statBad','statRetry'].forEach(id => document.getElementById(id).textContent = '0'); document.getElementById('progressBar').style.width = '0%';
            try {
                const res = await fetch('/api/start', { method: 'POST', headers: {'Authorization': `Bearer ${token}`}, body: formData });
                const data = await res.json();
                if (res.ok) { currentRunId = data.run_id; btn.innerHTML = '<i data-lucide="loader" class="w-4 h-4 md:w-5 md:h-5 animate-spin"></i><span>Fut...</span>'; addLog(`[START] ${data.total} combo | ${keyword} | ${data.speed}s`, 'info'); lucide.createIcons(); }
                else { alert(data.detail); btn.disabled = false; btn.innerHTML = '<i data-lucide="play" class="w-4 h-4 md:w-5 md:h-5"></i><span>START CHECKER</span>'; document.getElementById('stopBtn').classList.add('hidden'); lucide.createIcons(); }
            } catch(err) { alert('Hiba: ' + err); btn.disabled = false; btn.innerHTML = '<i data-lucide="play" class="w-4 h-4 md:w-5 md:h-5"></i><span>START CHECKER</span>'; document.getElementById('stopBtn').classList.add('hidden'); lucide.createIcons();}
        }

        async function stopChecker() {
            if (!confirm('Leállítod a checkert?')) return;
            try { await fetch('/api/stop', { method: 'POST', headers: {'Authorization': `Bearer ${token}`} }); addLog('[LEÁLLÍTÁS FOLYAMATBAN...]', 'info'); } catch(err) { alert('Hiba: ' + err); }
        }

        async function downloadResults(type, runId = null) {
            const targetRunId = runId || currentRunId;
            if (!targetRunId) return alert('Nincs futtatás!');
            try {
                const res = await fetch(`/api/get_download_url/${targetRunId}/${type}`, { headers: {'Authorization': `Bearer ${token}`} });
                const data = await res.json();
                if (res.ok && data.url) { window.open(data.url, '_blank'); } else { alert('Nincs találat vagy hiba történt a letöltéskor!'); }
            } catch (err) { alert('Hiba a letöltéskor: ' + err); }
        }

        async function loadHistory() {
            try {
                const res = await fetch('/api/runs', { headers: {'Authorization': `Bearer ${token}`} });
                const runs = await res.json();
                const c = document.getElementById('historyList');
                if (!runs.length) { c.innerHTML = '<div class="text-white/20 text-center py-6 md:py-10 text-xs md:text-sm flex flex-col items-center gap-2 md:gap-3"><i data-lucide="clock" class="w-5 h-5 md:w-6 md:h-6 opacity-30"></i>Még nem indítottál keresést...</div>'; lucide.createIcons(); return; }
                c.innerHTML = runs.map(run => {
                    const st = run.status === 'running' ? '<span class="status-running"><i data-lucide="loader" class="w-3 h-3 animate-spin"></i>Fut</span>' : '<span class="status-finished"><i data-lucide="check" class="w-3 h-3"></i>Kész</span>';
                    const dateObj = new Date(run.started_at);
                    const formattedDate = dateObj.toLocaleDateString('hu-HU') + ' ' + dateObj.toLocaleTimeString('hu-HU', {hour: '2-digit', minute:'2-digit'});
                    
                    return `<div class="history-item"><div class="flex flex-col md:flex-row md:items-center justify-between gap-4 md:gap-0"><div class="flex-1 w-full">
                        <div class="flex items-center gap-2 md:gap-3 mb-2">${st}<span class="text-white font-semibold text-sm truncate">${run.keyword}</span></div>
                        <div class="text-[10px] md:text-xs text-white/30 flex items-center gap-1.5 md:gap-2 flex-wrap">
                            <span>${formattedDate}</span><span class="hidden md:inline">·</span><span class="md:hidden w-full h-[1px] bg-white/5 my-1"></span>
                            <span>${run.total} combo</span><span>·</span>
                            <span class="text-green-400/60">${run.hits} hit</span><span>·</span>
                            <span class="text-cyan-400/60">${run.custom} custom</span>
                        </div>
                    </div>${run.status === 'finished' && (run.hits > 0 || run.custom > 0) ? `<div class="flex gap-2 w-full md:w-auto">
                        ${run.hits > 0 ? `<button onclick="downloadResults('hits', '${run._id}')" class="mini-download-btn flex-1 md:flex-none justify-center flex items-center gap-1"><i data-lucide="download" class="w-3 h-3"></i>Hits</button>` : ''}
                        ${run.custom > 0 ? `<button onclick="downloadResults('custom', '${run._id}')" class="mini-download-btn flex-1 md:flex-none justify-center flex items-center gap-1"><i data-lucide="download" class="w-3 h-3"></i>Custom</button>` : ''}
                    </div>` : ''}</div></div>`;
                }).join('');
                lucide.createIcons();
            } catch(err) {}
        }

        function logout() { if (confirm('Kijelentkezel?')) { localStorage.clear(); window.location.href = '/'; } }

        document.getElementById('checkerForm').addEventListener('submit', startChecker);
        connectWS(); loadHistory();
    </script>
</body>
</html>
