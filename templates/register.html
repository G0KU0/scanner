<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Regisztráció - Hotmail Inboxer VIP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="app-bg">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
        <div class="grid-overlay"></div>
    </div>

    <div class="min-h-screen flex flex-col items-center justify-center p-4 relative z-10">
        <div class="glass-card rounded-[2.5rem] p-10 max-w-md w-full animate-fade-in">
            <div class="text-center mb-10">
                <div class="inline-flex items-center justify-center w-20 h-20 rounded-[1.2rem] mb-6" style="background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.05)); border: 1px solid rgba(255,255,255,0.2); box-shadow: 0 0 40px rgba(99, 102, 241, 0.4);">
                    <i data-lucide="user-plus" class="w-10 h-10 text-white"></i>
                </div>
                <h1 class="text-3xl font-black text-white mb-2 tracking-tight text-gradient">VIP Regisztráció</h1>
                <p class="text-white/40 text-xs tracking-[0.2em] uppercase font-bold">Zártkörű Rendszer</p>
            </div>
            
            <form id="registerForm" class="space-y-5">
                <div>
                    <label class="block text-white/70 text-[11px] mb-2 font-bold uppercase tracking-wider flex items-center gap-2"><i data-lucide="mail" class="w-3.5 h-3.5 text-indigo-400"></i> Email cím</label>
                    <input type="email" id="email" required placeholder="sajat@email.com" class="glass-input">
                </div>
                <div>
                    <label class="block text-white/70 text-[11px] mb-2 font-bold uppercase tracking-wider flex items-center gap-2"><i data-lucide="shield" class="w-3.5 h-3.5 text-indigo-400"></i> Jelszó</label>
                    <input type="password" id="password" required minlength="6" placeholder="••••••••" class="glass-input">
                </div>
                <div>
                    <label class="block text-white/70 text-[11px] mb-2 font-bold uppercase tracking-wider flex items-center gap-2"><i data-lucide="ticket" class="w-3.5 h-3.5 text-purple-400"></i> Meghívó kód (Invite)</label>
                    <input type="text" id="invite_code" required placeholder="INBOX-XXXXXX" class="glass-input uppercase font-mono tracking-widest">
                </div>
                
                <button type="submit" class="glass-button w-full mt-8"><span>Fiók létrehozása</span><i data-lucide="arrow-right" class="w-5 h-5"></i></button>
            </form>
            
            <div class="mt-8 text-center">
                <p class="text-white/30 text-sm">Van már fiókod?</p>
                <a href="/" class="text-indigo-400 font-bold hover:text-indigo-300 transition text-sm mt-1 inline-flex items-center gap-1">Bejelentkezés<i data-lucide="chevron-right" class="w-4 h-4"></i></a>
            </div>
            <div id="error" class="hidden mt-4 p-4 bg-red-500/10 border border-red-500/30 text-red-300 rounded-2xl text-sm flex items-center gap-3 font-medium"></div>
        </div>
    </div>

    <script>
        lucide.createIcons();
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const originalHtml = btn.innerHTML;
            btn.disabled = true; btn.innerHTML = '<i data-lucide="loader" class="w-5 h-5 animate-spin"></i> Regisztráció...'; lucide.createIcons();
            const formData = new FormData(); formData.append('email', document.getElementById('email').value); formData.append('password', document.getElementById('password').value); formData.append('invite_code', document.getElementById('invite_code').value.trim());
            try {
                const res = await fetch('/api/register', { method: 'POST', body: formData });
                const data = await res.json();
                if (res.ok) { localStorage.setItem('token', data.token); localStorage.setItem('email', data.email); window.location.href = '/dashboard'; } 
                else {
                    const err = document.getElementById('error');
                    err.innerHTML = '<i data-lucide="alert-octagon" class="w-5 h-5 flex-shrink-0"></i>' + data.detail;
                    err.classList.remove('hidden'); btn.disabled = false; btn.innerHTML = originalHtml; lucide.createIcons();
                    setTimeout(() => err.classList.add('hidden'), 4000);
                }
            } catch(err) { alert('Hiba történt a szerverhez való csatlakozáskor!'); btn.disabled = false; btn.innerHTML = originalHtml; }
        });
    </script>
</body>
</html>
