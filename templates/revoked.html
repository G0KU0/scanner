<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hozzáférés megtagadva</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0a0a1a;
            position: relative;
            overflow: hidden;
        }

        .bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
        }

        .bg .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.3;
        }

        .bg .orb:nth-child(1) {
            width: 500px; height: 500px;
            background: #e74c3c;
            top: -200px; left: -100px;
            animation: pulse 8s ease-in-out infinite;
        }

        .bg .orb:nth-child(2) {
            width: 400px; height: 400px;
            background: #c0392b;
            bottom: -200px; right: -100px;
            animation: pulse 10s ease-in-out infinite reverse;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.3; }
            50% { transform: scale(1.2); opacity: 0.2; }
        }

        .card {
            position: relative;
            z-index: 10;
            background: rgba(255,255,255,0.04);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(231,76,60,0.2);
            border-radius: 24px;
            padding: 60px 50px;
            text-align: center;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 25px 60px rgba(0,0,0,0.5);
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, #e74c3c, #c0392b, #e74c3c);
            border-radius: 24px 24px 0 0;
        }

        .icon-wrapper {
            width: 100px; height: 100px;
            background: rgba(231,76,60,0.1);
            border: 2px solid rgba(231,76,60,0.2);
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 30px;
            animation: icon-pulse 2s ease-in-out infinite;
        }

        @keyframes icon-pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(231,76,60,0.2); }
            50% { box-shadow: 0 0 0 20px rgba(231,76,60,0); }
        }

        .icon-wrapper i {
            font-size: 44px;
            color: #e74c3c;
        }

        h1 {
            color: #e74c3c;
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 15px;
        }

        p {
            color: rgba(255,255,255,0.6);
            font-size: 15px;
            line-height: 1.7;
            margin-bottom: 10px;
        }

        .highlight {
            color: #f39c12;
            font-weight: 600;
        }

        .steps {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 14px;
            padding: 20px;
            margin: 25px 0;
            text-align: left;
        }

        .steps h4 {
            color: rgba(255,255,255,0.8);
            font-size: 14px;
            margin-bottom: 12px;
        }

        .step {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 0;
            color: rgba(255,255,255,0.5);
            font-size: 13px;
        }

        .step-num {
            width: 28px; height: 28px;
            background: rgba(102,126,234,0.15);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 700;
            color: #667eea;
            flex-shrink: 0;
        }

        .btn-go {
            padding: 16px 40px;
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
        }

        .btn-go:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(231,76,60,0.3);
        }
    </style>
</head>
<body>

    <div class="bg">
        <div class="orb"></div>
        <div class="orb"></div>
    </div>

    <div class="card">
        <div class="icon-wrapper">
            <i class="fas fa-user-lock"></i>
        </div>

        <h1>Hozzáférés megtagadva</h1>

        <p>
            A meghívó kódod <span class="highlight">törölve lett</span> az adminisztrátor által.
            Jelenleg nem használhatod a weboldalt.
        </p>

        <div class="steps">
            <h4>Mit tehetsz?</h4>
            <div class="step">
                <div class="step-num">1</div>
                Kérj egy új meghívó kódot az adminisztrátortól
            </div>
            <div class="step">
                <div class="step-num">2</div>
                Regisztrálj újra az új kóddal
            </div>
            <div class="step">
                <div class="step-num">3</div>
                Használd a weboldalt normálisan
            </div>
        </div>

        <button class="btn-go" onclick="goLogin()">
            <i class="fas fa-sign-out-alt"></i> Vissza a bejelentkezéshez
        </button>
    </div>

    <script>
        function goLogin() {
            localStorage.removeItem('token');
            localStorage.removeItem('email');
            window.location.href = '/';
        }
    </script>
</body>
</html>
